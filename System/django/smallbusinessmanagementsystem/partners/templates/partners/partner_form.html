{% extends "base_generic.html" %}
{% load i18n %}

{% block title %}
    <title>{% trans "Partner Creation" %}</title>
{% endblock %}

{% block main %}
    <h1>{% trans "Partner Creation" %}</h1>
    <form action="" method="post">
        {% csrf_token %}
        <table>
            {{ form.as_table }}
        </table>
        <input type="submit" value={% if create %}{% trans "Create" %}{% else %}{% trans "Modify" %}{% endif %}>
    </form>
{% endblock %}
